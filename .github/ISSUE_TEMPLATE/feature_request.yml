name: Feature request / idea
description: Suggest an improvement to the library or the ves CLI.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Heads up: this is security-critical software backed by a hosted service.
        Changes to **cryptography, the API surface, or the wire protocol** can't
        always be merged, and are best discussed here **before** any code is written.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point, not just the proposed mechanism.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. CLI option, C API addition, behavior change, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you've tried.
  - type: dropdown
    id: surface
    attributes:
      label: Does this touch cryptography, the API surface, or the protocol?
      options:
        - "No — CLI/UX, docs, build, or internal change"
        - "Yes — please discuss before I (or anyone) write code"
        - "Not sure"
    validations:
      required: true
